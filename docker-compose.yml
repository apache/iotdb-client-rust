# Standalone IoTDB for integration tests (simplest topology).
# Usage: docker compose up -d && cargo test
# For a 1C1D cluster topology, see docker-compose-1c1d.yml.

services:
  iotdb:
    image: apache/iotdb:2.0.6-standalone
    container_name: iotdb-rust-standalone
    restart: unless-stopped
    ports:
      - "6667:6667"
    environment:
      - IOTDB_JMX_OPTS=-Xms1G -Xmx1G -XX:MaxDirectMemorySize=384M
    healthcheck:
      test: ["CMD", "ls", "/iotdb/data/datanode/system"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 20s
